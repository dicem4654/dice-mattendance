
<html>
<head>
<meta name="viewport"
content="width=device-width,initial-scale=1.0">
<title>DICE-M Attendance System </title>


<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: #ffffff; /* Baahar ka background ab White hai */
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: linear-gradient(to bottom right, #1a9291, #4b3082); /* Teal to Purple gradient */
  width: 450px; /* Slimmer card like the image */
    height:650px;
  padding: 70px 50px;
  border-radius: 50px; /* Extra rounded corners */
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  text-align: center;
  color: white;
}

h2 {
  font-size: 40px;
  margin-bottom: 7px;
  color: white;
}

h3 {
  margin-top: 0;
  color: rgba(255,255,255,0.7);
  font-size: 20px;
  margin-bottom: 30px;
}

/* Input labels like 'Username' and 'Password' in image */
.label-text {
  text-align: left;
  display: block;
  font-size: 12px;
  margin-left: 10px;
  margin-bottom: 5px;
  color: rgba(255,255,255,0.8);
}

input, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 20px;
  border-radius: 25px; /* Fully rounded inputs */
  border: none;
  background: #d1d5db; /* Greyish background like image */
  font-size: 14px;
  box-sizing: border-box;
  outline: none;
}

button {
  background: #ff4d4d; /* Bright Red color */
  color: white; /* Text white hi rahega taaki red par saaf dikhe */
  border: none;
  padding: 15px;
  width: 100%;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
  font-size: 18px;
  margin-top: 10px;
  transition: 0.3s;
}

button:hover {
  background: #cc0000; /* Darker red jab mouse button par le jayein */
  transform: scale(1.02);
}

.footer-text {
  font-size: 20px;
  margin-top: 20px;
  opacity: 0.6;
}

.success {
  color: #2ecc71;
  font-size: 25px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">


<h2>DICE-M COMPUTER ACADEMY</h2>
<h3>Attendance System</h3>

<input type="text" id="student" placeholder="Enter Name" required>

<select id="role" required>
<option value="">Select Role</option>
<option value="Student">Student</option>
<option value="Teacher">Teacher</option>
</select>

<select id="status" required >
<option value="P">select P/A</option>
<option value="P">Present</option>
<option value="A">Absent</option>
</select>

<button onclick="mark()">Submit Attendance</button>
<p class="footer-text">
Digital Institute of Computer Education-Mission</p>

<p class="success" id="msg"></p>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbxUrvRbgJ_l8rbFLMKh5lvjafOU5GDg_kq8dBJ5DC8lBTkISE_63UZLOzJTBxzcnuqH/exec";

function mark(){

  var name = document.getElementById("student").value;
  var role = document.getElementById("role").value;
  var status = document.getElementById("status").value;

  if(name=="" || role==""){
    alert("Please fill all fields");
    return;
  }

  fetch(scriptURL,{
    method:"POST",
    body:JSON.stringify({
      name:name,
      role:role,
      status:status
    })
  })
  .then(res=>res.text())
  .then(data=>{
    document.getElementById("msg").innerHTML="Attendance Saved Successfully ✅";
    document.getElementById("student").value="";
  })
  .catch(error=>{
    alert("Error Saving Attendance ❌");
  });
}

</script>

</body>
</html>
