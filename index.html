<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICE-M Attendance System</title>
    <link rel="icon" href="https://dicem4654.github.io/dice-mattendance/app%20icon.png">
    <link rel="manifest" href="/manifest.json">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: linear-gradient(to bottom right, #1a9291, #4b3082);
            width: 100%;
            min-height: 100vh;
            padding: 40px 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            transition: all 0.3s ease;
        }

        @media (min-width: 481px) {
            .card {
                width: 450px;
                min-height: 90vh;
                height: auto;
                border-radius: 50px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            }
        }

        h2 {
            font-size: 28px;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        h3 {
            margin: 0 0 30px 0;
            color: rgba(255,255,255,0.7);
            font-size: 18px;
            font-weight: 400;
        }

        .input-group {
            width: 100%;
            max-width: 350px;
        }

        input, select {
            width: 100%;
            padding: 14px 20px;
            margin-bottom: 15px;
            border-radius: 25px;
            border: none;
            background: #d1d5db;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            color: #333;
        }

        button {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover { background: #cc0000; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #7f8c8d; cursor: not-allowed; }

        .retry-btn {
            background: #f39c12;
            display: none; /* Hidden by default */
        }

        .retry-btn:hover { background: #e67e22; }

        .footer-text {
            font-size: 14px;
            margin-top: 30px;
            opacity: 0.7;
            max-width: 280px;
        }

        .success {
            color: #2ecc71;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://raw.githubusercontent.com/dicem4654/dice-mattendance/main/DICE-M%20LOGO.png" width="120px" alt="Logo">

        <h2>DICE-M COMPUTER ACADEMY</h2>
        <h3>Attendance System</h3>

        <div class="input-group">
            <input type="text" id="student" placeholder="Enter Name" required>

            <select id="role" required>
                <option value="">Select Role</option>
                <option value="Student">Student</option>
                <option value="Teacher">Teacher</option>
            </select>

            <select id="status" required>
                <option value="P">Present</option>
                <option value="A">Absent</option>
            </select>

            <button id="submitBtn" onclick="mark()">Submit Attendance</button>
            <button id="retryBtn" class="retry-btn" onclick="mark()">Retry Location ↻</button>
        </div>

        <p class="success" id="msg"></p>

        <p class="footer-text">
            Digital Institute of Computer Education-Mission
        </p>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbxUrvRbgJ_l8rbFLMKh5lvjafOU5GDg_kq8dBJ5DC8lBTkISE_63UZLOzJTBxzcnuqH/exec";

        // --- CONFIGURATION ---
        const targetLat = 24.8650; // <--- REPLACE WITH YOUR LATITUDE
        const targetLon = 92.4630; // <--- REPLACE WITH YOUR LONGITUDE
        const maxDistance = 100;    // Maximum allowed distance in meters
        // ---------------------

        function mark() {
            const name = document.getElementById("student").value;
            const role = document.getElementById("role").value;
            const status = document.getElementById("status").value;
            const msgLabel = document.getElementById("msg");
            const retryBtn = document.getElementById("retryBtn");
            const submitBtn = document.getElementById("submitBtn");

            if (name.trim() === "" || role === "") {
                alert("Please fill all fields");
                return;
            }

            // UI Feedback
            msgLabel.style.color = "white";
            msgLabel.innerHTML = "Verifying location...";
            retryBtn.style.display = "none";
            submitBtn.disabled = true;

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const userLat = position.coords.latitude;
                        const userLon = position.coords.longitude;
                        
                        const distance = getDistance(userLat, userLon, targetLat, targetLon);

                        if (distance <= maxDistance) {
                            saveAttendance(name, role, status, msgLabel, submitBtn);
                        } else {
                            msgLabel.style.color = "#ff4d4d";
                            msgLabel.innerHTML = `Out of range! You are ${Math.round(distance)}m away. ❌`;
                            retryBtn.style.display = "block";
                            submitBtn.disabled = false;
                        }
                    },
                    (error) => {
                        console.error(error);
                        msgLabel.style.color = "#ff4d4d";
                        msgLabel.innerHTML = "Location access denied or timed out. ❌";
                        retryBtn.style.display = "block";
                        submitBtn.disabled = false;
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                alert("Geolocation is not supported by your browser.");
            }
        }

        // Haversine formula to calculate distance between two points in meters
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Earth's radius in meters
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;

            const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            return R * c; 
        }

        function saveAttendance(name, role, status, msgLabel, submitBtn) {
            msgLabel.style.color = "white";
            msgLabel.innerHTML = "Saving Attendance...";

            fetch(scriptURL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    name: name,
                    role: role,
                    status: status
                })
            })
            .then(() => {
                msgLabel.style.color = "#2ecc71";
                msgLabel.innerHTML = "Attendance Saved Successfully ✅";
                document.getElementById("student").value = "";
                submitBtn.disabled = false;
                
                setTimeout(() => {
                    msgLabel.innerHTML = "";
                }, 5000);
            })
            .catch(error => {
                console.error('Error!', error.message);
                msgLabel.style.color = "#ff4d4d";
                msgLabel.innerHTML = "Error Saving Attendance ❌";
                submitBtn.disabled = false;
            });
        }
    </script>
</body>
</html>
