<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICE-M Attendance System</title>
    <link rel="icon" href="https://dicem4654.github.io/dice-mattendance/app%20icon.png">
    <link rel="manifest" href="/manifest.json">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: linear-gradient(to bottom right, #1a9291, #4b3082);
            width: 100%;
            min-height: 100vh;
            padding: 40px 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            transition: all 0.3s ease;
        }

        @media (min-width: 481px) {
            .card {
                width: 450px;
                min-height: 90vh;
                height: auto;
                border-radius: 50px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            }
        }

        h2 {
            font-size: 28px;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        h3 {
            margin: 0 0 30px 0;
            color: rgba(255,255,255,0.7);
            font-size: 18px;
            font-weight: 400;
        }

        .input-group {
            width: 100%;
            max-width: 350px;
        }

        input, select {
            width: 100%;
            padding: 14px 20px;
            margin-bottom: 15px;
            border-radius: 25px;
            border: none;
            background: #d1d5db;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            color: #333;
        }

        button {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover { background: #cc0000; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #7f8c8d; cursor: not-allowed; }

        .retry-btn {
            background: #f39c12;
            display: none; /* Hidden by default */
        }

        .retry-btn:hover { background: #e67e22; }

        .footer-text {
            font-size: 14px;
            margin-top: 30px;
            opacity: 0.7;
            max-width: 280px;
        }

        .success {
            color: #2ecc71;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://raw.githubusercontent.com/dicem4654/dice-mattendance/main/DICE-M%20LOGO.png" width="120px" alt="Logo">

        <h2>DICE-M COMPUTER ACADEMY</h2>
        <h3>Attendance System</h3>

        <div class="input-group">
            <input type="text" id="student" placeholder="Enter Name" required>

            <select id="role" required>
                <option value="">Select Role</option>
                <option value="Student">Student</option>
                <option value="Teacher">Teacher</option>
            </select>

            <select id="status" required>
				<option value="P">Select P/A</option>
                <option value="P">Present</option>
                <option value="A">Absent</option>
            </select>

            <button id="submitBtn" onclick="mark()">Submit Attendance</button>
            <button id="retryBtn" class="retry-btn" onclick="mark()">Retry Location ↻</button>
        </div>

        <p class="success" id="msg"></p>

        <p class="footer-text">
            Digital Institute of Computer Education-Mission
        </p>
    </div>

    <script>
		const scriptURL = "https://script.google.com/macros/s/AKfycbxUrvRbgJ_l8rbFLMKh5lvjafOU5GDg_kq8dBJ5DC8lBTkISE_63UZLOzJTBxzcnuqH/exec";

		// TARGET: DICE-M COMPUTER ACADEMY
		const targetLat = 24.870778427951855; 
		const targetLon = 92.55999038457415; 
		const maxDistance = 200; // Increased to 200m to allow for indoor GPS drift
		const maxEntries = 2; // Device limit

		function mark() {
			const name = document.getElementById("student").value;
			const role = document.getElementById("role").value;
			const status = document.getElementById("status").value;
			const msgLabel = document.getElementById("msg");
			const retryBtn = document.getElementById("retryBtn");
			const submitBtn = document.getElementById("submitBtn");

			// 1. Check Device Limit
        let currentCount = parseInt(localStorage.getItem("dice_m_entry_count") || "0");
        if (currentCount >= maxEntries) {
            msgLabel.style.color = "#ff4d4d";
            msgLabel.innerHTML = "Limit Reached: Only 2 entries allowed per device. ❌";
            return;
        }

			if (name.trim() === "" || role === "") {
				alert("Please enter your name and select a role.");
				return;
			}

			msgLabel.style.color = "white";
			msgLabel.innerHTML = "Searching for satellites... 🛰️";
			retryBtn.style.display = "none";
			submitBtn.disabled = true;

			const options = {
				enableHighAccuracy: true, // Forces GPS chip
				timeout: 30000,           // Wait up to 30 seconds
				maximumAge: 0             // No old/cached locations
			};

			navigator.geolocation.getCurrentPosition(
				(position) => {
					const userLat = position.coords.latitude;
					const userLon = position.coords.longitude;
					const accuracy = position.coords.accuracy; // How accurate the GPS is in meters
					
					const distance = getDistance(userLat, userLon, targetLat, targetLon);

					console.log(`Accuracy: ${accuracy}m, Distance: ${distance}m`);

					if (distance <= maxDistance) {
						saveAttendance(name, role, status, msgLabel, submitBtn);
					} else {
						msgLabel.style.color = "#ff4d4d";
						msgLabel.innerHTML = `Too far away! (${Math.round(distance)}m)`;
						// This alert helps you see if the phone is just being lazy
						alert(`GPS Error: You are ${Math.round(distance)}m away. Accuracy is ${Math.round(accuracy)}m.`);
						retryBtn.style.display = "block";
						submitBtn.disabled = false;
					}
				},
				(error) => {
					let errorMsg = "Location failed.";
					if(error.code == 1) errorMsg = "Please allow Location Access in settings. ❌";
					if(error.code == 2) errorMsg = "GPS signal lost. Move to a window. ❌";
					if(error.code == 3) errorMsg = "GPS Timeout. Try again. ❌";
					
					msgLabel.style.color = "#ff4d4d";
					msgLabel.innerHTML = errorMsg;
					retryBtn.style.display = "block";
					submitBtn.disabled = false;
				}, 
				options
			);
		}

		function getDistance(lat1, lon1, lat2, lon2) {
			const R = 6371e3; 
			const dLat = (lat2 - lat1) * Math.PI / 180;
			const dLon = (lon2 - lon1) * Math.PI / 180;
			const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
					  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
			const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
			return R * c; 
		}

		function saveAttendance(name, role, status, msgLabel, submitBtn) {
			msgLabel.innerHTML = "Saving...";
			fetch(scriptURL, {
				method: "POST",
				mode: "no-cors",
				body: JSON.stringify({ name, role, status })
			})
			.then(() => {
				msgLabel.style.color = "#2ecc71";
				msgLabel.innerHTML = "Attendance Saved Successfully! ✅";
				document.getElementById("student").value = "";
				submitBtn.disabled = false;
				setTimeout(() => { msgLabel.innerHTML = ""; }, 5000);
			})
			.catch(() => {
				msgLabel.innerHTML = "Error saving. ❌";
				submitBtn.disabled = false;
			});
		}
	</script>
</body>
</html>
